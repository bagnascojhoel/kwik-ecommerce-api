kwik-ecommerce:
  db:
    name: ${DB_NAME:kwik_ecommerce_db__automation}
    file: ${AUTOMATION_DB_FILE:./data/automation}
    user: kwik
    pass: kwik

spring:
  liquibase:
    enabled: true
    contexts: automation
    change-log: classpath:/changelog/changelog-main.yml
    user: ${kwik-ecommerce.db.user}
    password: ${kwik-ecommerce.db.pass}

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${kwik-ecommerce.db.file}
    username: ${kwik-ecommerce.db.user}
    password: ${kwik-ecommerce.db.pass}

  jpa:
    ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
#    root: DEBUG